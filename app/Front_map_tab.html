<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalHub | 지도</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
  :root {
    --mint-50: #f4fdfb;
    --mint-100: #dbf5ee;
    --mint-200: #bfeee5;
    --mint-400: #79d2bf;
    --mint-500: #47bfa6;
    --mint-700: #2d8e7d;
    --ink-700: #25433d;
    --ink-500: #5d7570;
    --white: #ffffff;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Noto Sans KR", sans-serif;
    background: linear-gradient(135deg, var(--mint-50), #ffffff 70%);
    color: var(--ink-700);
  }

  a {
    text-decoration: none;
    color: inherit;
  }

  button {
    font: inherit;
    cursor: pointer;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0 24px;
  }

  .brand {
    font-family: "Poppins", sans-serif;
    font-size: 1.45rem;
    font-weight: 800;
    color: var(--mint-700);
    letter-spacing: -0.03em;
  }

  .nav-links {
    display: flex;
    gap: 16px;
    font-weight: 700;
    color: var(--ink-500);
  }

  .nav-links a:hover {
    color: var(--mint-700);
  }

  .section {
    margin-bottom: 14px;
  }

  .section-title {
    font-family: "Poppins", sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .tab-switcher {
    margin-bottom: 24px;
  }

  .tab-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--mint-200);
    background: var(--white);
    color: var(--ink-500);
    border-radius: 999px;
    padding: 10px 14px;
    font-weight: 700;
    text-decoration: none;
  }

  .tab-button.active {
    background: var(--mint-500);
    color: white;
    border-color: var(--mint-500);
  }

  .map-card {
    background: var(--white);
    border: 1px solid var(--mint-100);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 8px 24px rgba(35, 67, 61, 0.05);
  }

  .map-box {
    min-height: 320px;
    border-radius: 20px;
    background: linear-gradient(135deg, #bfeee5, #79d2bf);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    text-align: center;
    margin-bottom: 20px;
    padding: 20px;
  }

  .place-list {
    display: grid;
    gap: 12px;
  }

  .place-card {
    background: var(--mint-50);
    border: 1px solid var(--mint-100);
    border-radius: 16px;
    padding: 18px;
  }

  .place-card h3 {
    margin: 0 0 8px;
  }

  .place-card p {
    margin: 0;
    color: var(--ink-500);
  }

  .btn {
    margin-top: 20px;
    border: none;
    background: var(--mint-500);
    color: white;
    padding: 12px 18px;
    border-radius: 999px;
    font-weight: 700;
    cursor: pointer;
  }

  .info-grid {
    display: grid;
    gap: 16px;
  }

  .info-card {
    background: var(--white);
    border: 1px solid var(--mint-100);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 24px rgba(35, 67, 61, 0.05);
  }

  .info-card h3 {
    margin: 0 0 10px;
  }

  .info-card p {
    margin: 0;
    color: var(--ink-500);
    line-height: 1.7;
  }

  @media (max-width: 560px) {
    .container {
      padding: 18px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 24px;
    }
  }
</style>
  </head>

  <body>
    <div id="app">
      <div class="container">
        <header class="topbar">
          <a class="brand" href="Front_end.html">LocalHub</a>
          <nav class="nav-links">
            <a href="Front_end.html">홈</a>
            <a href="Front_information.html">지역정보</a>
            <a href="Front_map_tab.html">지도</a>
            <a href="Front_community.html">커뮤니티</a>
          </nav>
        </header>

            <section class="section">
      <h1 class="page-title">지도</h1>
      <p class="page-subtitle">
        한국관광공사 TourAPI 데이터를 기반으로 한 지역 정보 검색 및 카테고리별 필터를 제공합니다.
      </p>

      <div v-if="activeTab === 'map'" class="map-card">
        <div class="map-box">
          {{ mapMessage }}
          <br />
          실제 지도 API 연결 시 위치 마커와 경로가 표시됩니다.
        </div>

        <h3>추천 위치</h3>

        <div class="place-list">
          <div class="place-card" v-for="place in places" :key="place.id">
            <h3>{{ place.name }}</h3>
            <p>{{ place.description }}</p>
          </div>
        </div>

        <button class="btn" @click="showMessage">현재 위치 확인</button>
        <p v-if="message">{{ message }}</p>
      </div>

      <div v-else class="info-grid">
        <div class="info-card" v-for="item in infoItems" :key="item.id">
          <h3>{{ item.title }}</h3>
          <p>{{ item.description }}</p>
        </div>
      </div>
    </section>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
  const { createApp } = Vue;

  createApp({
    data() {
      return {
        activeTab: "map",
        mapMessage: "구미·경북권 지도 영역",
        message: "",
        places: [],
        infoItems: [],
      };
    },
    async mounted() {
      try {
        // 원격 백엔드로 변경
        const response = await fetch("https://backendserver-tuvk.onrender.com/locations/");

        if (response.ok) {
          const data = await response.json();

          const arr = Array.isArray(data) ? data : (data.items ?? data.results ?? []);
          // 추천 위치 (상위 3개)
          this.places = (arr || []).slice(0, 3).map(loc => ({
            id: loc.id ?? loc.location_id ?? Math.random().toString(36).slice(2, 9),
            name: loc.name ?? loc.title ?? "이름 없음",
            description: loc.address ?? loc.description ?? "주소 정보 없음",
          }));

          // 전체 리스트
          this.infoItems = (arr || []).map(loc => ({
            id: loc.id ?? loc.location_id ?? Math.random().toString(36).slice(2, 9),
            title: loc.name ?? loc.title ?? "이름 없음",
            description: loc.description ?? loc.address ?? "",
          }));

          console.log("백엔드 데이터 연동 성공!");
        } else {
          throw new Error("서버에서 올바른 응답을 받지 못했습니다.");
        }
      } catch (error) {
        console.warn("백엔드 연동에 실패하여 더미 데이터를 표시합니다.", error);
        this.setFallbackDummyData();
      }
    },
    methods: {
      showMessage() {
        this.message = "현재 구미·경북 지역 중심으로 지도를 표시하고 있습니다.";
      },
      setFallbackDummyData() {
        this.places = [
          {
            id: 1,
            name: "금오산 도립공원",
            description: "아름다운 자연 경관과 케이블카, 폭포를 즐길 수 있는 구미의 대표 명소입니다.",
          },
          {
            id: 2,
            name: "동락공원",
            description: "낙동강을 따라 길게 조성된 수변 공원으로 자전거 타기와 산책에 매우 좋습니다.",
          },
          {
            id: 3,
            name: "구미 에코랜드",
            description: "생태숲 모노레일과 산림문화관이 있어 가족 단위 여행객에게 인기가 많습니다.",
          },
        ];
        this.infoItems = [
          {
            id: 1,
            title: "금오산 금오지 올레길",
            description: "저수지를 둘러싼 수변 데크 산책로로 벚꽃과 단풍 등 사계절 내내 풍경이 아름답습니다.",
          },
          {
            id: 2,
            title: "새마을운동테마공원",
            description: "근현대사를 한눈에 볼 수 있는 전시관과 넓은 공원이 깔끔하게 조성되어 있습니다.",
          },
          {
            id: 3,
            title: "신라불교초전지",
            description: "신라에 불교가 처음 전해진 역사를 담은 곳으로, 전통 한옥의 고즈넉한 멋을 느낄 수 있습니다.",
          },
        ];
      },
    },
  }).mount("#app");
    </script>
  </body>
</html>
